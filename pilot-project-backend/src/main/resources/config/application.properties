# ===============================
# Storage folder where contains assets in project
# ===============================
parent.folder.images.brand=images/brand/
parent.folder.images.product=images/product/

# ===============================
# SPRING CONFIGURATIONS
# ===============================
spring.application.name=pilot-project-backend

server.port = 8080

# ===============================
# LOGGING CONFIGURATIONS
# ===============================
logging.file.name=logs/pilot-project-backend.log
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.boot.web.servlet.support.ErrorPageFilter=OFF

# ===============================
# JWT
# ===============================
# jwt.secret=pilot-project-secret-key-must-be-at-least-32-characters-long
jwt.secret=${JWT_SECRET}

# ===============================
# MULTIPART (images)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# OAUTH2 GOOGLE
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_GOOGLE_URI}

# ===============================
# FRONTEND URL
# ===============================
frontend.url = ${FE_URL}